name: release-please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-slim
    steps:
      # 1. release-please-action でリリースPR / タグ作成を自動化
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: python
          target-branch: master

      # ---- 以下、リリースが作成された場合のみ実行 ----
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          ref: ${{ steps.release.outputs.tag_name }}

      # 2. uv のセットアップとビルド
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        if: ${{ steps.release.outputs.release_created }}
      - name: Build packages
        run: uv build
        if: ${{ steps.release.outputs.release_created }}

      # 3. Bitbucket リポジトリのクローン
      - name: Clone Bitbucket Repo
        env:
          BITBUCKET_TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
        run: |
          git config --global url."https://x-token-auth:${BITBUCKET_TOKEN}@bitbucket.org/".insteadOf "https://bitbucket.org/"
          git clone https://bitbucket.org/${{ vars.BITBUCKET_WORKSPACE }}/${{ vars.BITBUCKET_REPO }}.git bitbucket-repo
          cd bitbucket-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
        if: ${{ steps.release.outputs.release_created }}

      # 4. ビルド成果物 (.whl / .tar.gz) をコピーしてプッシュ (パッケージ名はリポジトリ名から動的に決定)
      - name: Copy Packages and Push
        run: |
          PACKAGE_NAME="${{ github.event.repository.name }}"
          
          # コピー先フォルダの作成
          mkdir -p "bitbucket-repo/packages/$PACKAGE_NAME/"
          
          # ビルドされた成果物 (dist/*) をコピー
          cp dist/* "bitbucket-repo/packages/$PACKAGE_NAME/"
          
          cd bitbucket-repo
          git add -A
          if git diff-index --quiet HEAD; then
            echo "No changes"
          else
            git commit -m "chore: deploy $PACKAGE_NAME ${{ steps.release.outputs.tag_name }} [skip ci]"
            git push origin HEAD
          fi
        if: ${{ steps.release.outputs.release_created }}
