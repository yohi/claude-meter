name: release-please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-slim
    env:
      BITBUCKET_WORKSPACE_NAME: ${{ vars.BITBUCKET_WORKSPACE_NAME }}
      BITBUCKET_REPOSITORY_NAME: ${{ vars.BITBUCKET_REPOSITORY_NAME }}
    steps:
      # 1. release-please-action でリリースPR / タグ作成を自動化
      - uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4
        id: release
        with:
          release-type: python
          target-branch: master

      # ---- 以下、リリースが作成された場合のみ実行 ----
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        if: ${{ steps.release.outputs.release_created }}
        with:
          ref: ${{ steps.release.outputs.tag_name }}

      # 2. uv のセットアップとビルド
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        if: ${{ steps.release.outputs.release_created }}
      - name: Build packages
        run: uv build
        if: ${{ steps.release.outputs.release_created }}

      # 3. Bitbucket リポジトリのクローン
      - name: Push to Bitbucket Mirror
        env:
          BITBUCKET_API_TOKEN: ${{ secrets.BITBUCKET_API_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
          BITBUCKET_MIRROR_REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          : "${BITBUCKET_WORKSPACE_NAME:?BITBUCKET_WORKSPACE_NAME is required}"
          : "${BITBUCKET_MIRROR_REPOSITORY_NAME:?BITBUCKET_MIRROR_REPOSITORY_NAME is required}"
          if [ -z "${BITBUCKET_API_TOKEN}" ]; then
            echo "BITBUCKET_API_TOKEN not set" >&2
            exit 1
          fi

          ASKPASS_SCRIPT="$(mktemp)"
          trap 'rm -f "$ASKPASS_SCRIPT"' EXIT
          printf '#!/bin/sh\necho "$BITBUCKET_API_TOKEN"\n' > "$ASKPASS_SCRIPT"
          chmod +x "$ASKPASS_SCRIPT"
          export GIT_ASKPASS="$ASKPASS_SCRIPT"

          MIRROR_REPO_URL="https://x-token-auth@bitbucket.org/${BITBUCKET_WORKSPACE_NAME}/${BITBUCKET_MIRROR_REPOSITORY_NAME}.git"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add bitbucket-mirror "${MIRROR_REPO_URL}"
          
          # Fetch Bitbucket master and merge it to handle previous deployment commits
          # Skip merge if remote master does not exist yet (e.g., first push)
          if git fetch bitbucket-mirror master; then
            git merge bitbucket-mirror/master --allow-unrelated-histories --no-edit -X ours
          fi
          
          git push bitbucket-mirror HEAD:master
          git push bitbucket-mirror "refs/tags/${RELEASE_TAG}"
        if: ${{ steps.release.outputs.release_created }}

      # 4. Bitbucket リポジトリのクローン
      - name: Clone Bitbucket Repo
        env:
          BITBUCKET_API_TOKEN: ${{ secrets.BITBUCKET_API_TOKEN }}
        run: |
          set -euo pipefail
          : "${BITBUCKET_WORKSPACE_NAME:?BITBUCKET_WORKSPACE_NAME is required}"
          : "${BITBUCKET_REPOSITORY_NAME:?BITBUCKET_REPOSITORY_NAME is required}"
          if [ -z "${BITBUCKET_API_TOKEN}" ]; then
            echo "BITBUCKET_API_TOKEN not set" >&2
            exit 1
          fi

          ASKPASS_SCRIPT="$(mktemp)"
          trap 'rm -f "$ASKPASS_SCRIPT"' EXIT
          printf '#!/bin/sh\necho "$BITBUCKET_API_TOKEN"\n' > "$ASKPASS_SCRIPT"
          chmod +x "$ASKPASS_SCRIPT"
          export GIT_ASKPASS="$ASKPASS_SCRIPT"

          BITBUCKET_REPO_URL="https://bitbucket.org/${BITBUCKET_WORKSPACE_NAME}/${BITBUCKET_REPOSITORY_NAME}.git"
          REPO_URL="https://x-token-auth@${BITBUCKET_REPO_URL#https://}"
          git clone "${REPO_URL}" bitbucket-repo

          cd bitbucket-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
        if: ${{ steps.release.outputs.release_created }}

      # 5. ビルド成果物 (.whl / .tar.gz) をコピーしてプッシュ (パッケージ名はリポジトリ名から動的に決定)
      - name: Copy Packages and Push
        env:
          BITBUCKET_API_TOKEN: ${{ secrets.BITBUCKET_API_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          : "${BITBUCKET_WORKSPACE_NAME:?BITBUCKET_WORKSPACE_NAME is required}"
          : "${BITBUCKET_REPOSITORY_NAME:?BITBUCKET_REPOSITORY_NAME is required}"
          PACKAGE_NAME="${{ github.event.repository.name }}"

          # コピー先フォルダの作成
          mkdir -p "bitbucket-repo/packages/$PACKAGE_NAME/"

          # ビルドされた成果物 (dist/*) をコピー
          cp dist/* "bitbucket-repo/packages/$PACKAGE_NAME/"

          # GIT_ASKPASS の設定
          ASKPASS_SCRIPT="$(mktemp)"
          trap 'rm -f "$ASKPASS_SCRIPT"' EXIT
          printf '#!/bin/sh\necho "$BITBUCKET_API_TOKEN"\n' > "$ASKPASS_SCRIPT"
          chmod +x "$ASKPASS_SCRIPT"
          export GIT_ASKPASS="$ASKPASS_SCRIPT"

          cd bitbucket-repo
          git add -A
          if git diff-index --quiet HEAD; then
            echo "No changes"
          else
            git commit -m "chore: deploy $PACKAGE_NAME ${RELEASE_TAG} [skip ci]"
            git push origin HEAD
          fi
        if: ${{ steps.release.outputs.release_created }}
