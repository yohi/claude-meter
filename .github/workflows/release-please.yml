name: release-please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-slim
    env:
      BITBUCKET_WORKSPACE_NAME: ${{ vars.BITBUCKET_WORKSPACE_NAME }}
      BITBUCKET_REPOSITORY_NAME: ${{ vars.BITBUCKET_REPOSITORY_NAME }}
      GIT_USER_NAME: ${{ vars.GIT_USER_NAME }}
      GIT_USER_EMAIL: ${{ vars.GIT_USER_EMAIL }}
    steps:
      # 1. release-please-action でリリースPR / タグ作成を自動化
      - uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4
        id: release
        with:
          release-type: python
          target-branch: master

      # ---- 以下、リリースが作成された場合のみ実行 ----
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        if: ${{ steps.release.outputs.release_created }}
        with:
          ref: ${{ steps.release.outputs.tag_name }}

      # 2. uv のセットアップとビルド
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        if: ${{ steps.release.outputs.release_created }}
      - name: Build packages
        run: uv build
        if: ${{ steps.release.outputs.release_created }}

      # 3. Bitbucket リポジトリのクローン
      - name: Clone Bitbucket Repo
        env:
          BITBUCKET_API_TOKEN: ${{ secrets.BITBUCKET_API_TOKEN }}
        run: |
          set -euo pipefail
          : "${BITBUCKET_WORKSPACE_NAME:?BITBUCKET_WORKSPACE_NAME is required}"
          : "${BITBUCKET_REPOSITORY_NAME:?BITBUCKET_REPOSITORY_NAME is required}"
          if [ -z "${BITBUCKET_API_TOKEN}" ]; then
            echo "BITBUCKET_API_TOKEN not set" >&2
            exit 1
          fi

          ASKPASS_SCRIPT="$(mktemp)"
          trap 'rm -f "$ASKPASS_SCRIPT"' EXIT
          printf '#!/bin/sh\necho "$BITBUCKET_API_TOKEN"\n' > "$ASKPASS_SCRIPT"
          chmod +x "$ASKPASS_SCRIPT"
          export GIT_ASKPASS="$ASKPASS_SCRIPT"

          BITBUCKET_REPO_URL="https://bitbucket.org/${BITBUCKET_WORKSPACE_NAME}/${BITBUCKET_REPOSITORY_NAME}.git"
          REPO_URL="https://x-token-auth@${BITBUCKET_REPO_URL#https://}"
          git clone "${REPO_URL}" bitbucket-repo

          cd bitbucket-repo
          git config user.name "${GIT_USER_NAME:-github-actions[bot]}"
          git config user.email "${GIT_USER_EMAIL:-github-actions[bot]@users.noreply.github.com}"
        if: ${{ steps.release.outputs.release_created }}

      # 4. ビルド成果物 (.whl / .tar.gz) およびソースファイルをコピーしてプッシュ
      - name: Copy Packages and Push
        env:
          BITBUCKET_API_TOKEN: ${{ secrets.BITBUCKET_API_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          : "${BITBUCKET_WORKSPACE_NAME:?BITBUCKET_WORKSPACE_NAME is required}"
          : "${BITBUCKET_REPOSITORY_NAME:?BITBUCKET_REPOSITORY_NAME is required}"
          PACKAGE_NAME="${{ github.event.repository.name }}"

          # 古いソースコードやファイルを削除 (packages と .git 以外)
          find bitbucket-repo -mindepth 1 -maxdepth 1 -not -name ".git" -not -name "packages" -exec rm -rf {} +

          # ソースコード、設定ファイル、READMEなどをコピー (存在するもののみ)
          for item in src pyproject.toml LICENSE; do
            if [ -e "$item" ]; then
              cp -r "$item" bitbucket-repo/
            fi
          done

          # Bitbucket用にREADME_BITBUCKET.mdをREADME.mdとしてコピーし、プレースホルダーを置換
          if [ -e README_BITBUCKET.md ]; then
            sed -e "s/<BITBUCKET_WORKSPACE_NAME>/${BITBUCKET_WORKSPACE_NAME}/g" \
                -e "s/<BITBUCKET_REPOSITORY_NAME>/${BITBUCKET_REPOSITORY_NAME}/g" \
                -e "s/<VERSION>/${RELEASE_TAG#v}/g" \
                README_BITBUCKET.md > bitbucket-repo/README.md
          elif [ -e README.md ]; then
            cp README.md bitbucket-repo/
          fi

          # install_bitbucket.sh.tmpl / install_bitbucket.ps1.tmpl のプレースホルダーを実値に置換してコピー
          if [ -e install_bitbucket.sh.tmpl ]; then
            sed -e "s/<BITBUCKET_WORKSPACE_NAME>/${BITBUCKET_WORKSPACE_NAME}/g" \
                -e "s/<BITBUCKET_REPOSITORY_NAME>/${BITBUCKET_REPOSITORY_NAME}/g" \
                install_bitbucket.sh.tmpl > bitbucket-repo/install.sh
            chmod +x bitbucket-repo/install.sh
          fi
          if [ -e install_bitbucket.ps1.tmpl ]; then
            sed -e "s/<BITBUCKET_WORKSPACE_NAME>/${BITBUCKET_WORKSPACE_NAME}/g" \
                -e "s/<BITBUCKET_REPOSITORY_NAME>/${BITBUCKET_REPOSITORY_NAME}/g" \
                install_bitbucket.ps1.tmpl > bitbucket-repo/install.ps1
          fi

          # コピー先フォルダの作成
          mkdir -p "bitbucket-repo/packages/$PACKAGE_NAME/"

          # ビルドされた成果物 (dist/*) をコピー
          cp dist/* "bitbucket-repo/packages/$PACKAGE_NAME/"

          # GIT_ASKPASS の設定
          ASKPASS_SCRIPT="$(mktemp)"
          trap 'rm -f "$ASKPASS_SCRIPT"' EXIT
          printf '#!/bin/sh\necho "$BITBUCKET_API_TOKEN"\n' > "$ASKPASS_SCRIPT"
          chmod +x "$ASKPASS_SCRIPT"
          export GIT_ASKPASS="$ASKPASS_SCRIPT"

          cd bitbucket-repo
          git add -A
          if git diff-index --quiet HEAD; then
            echo "No changes"
          else
            git commit -m "chore: deploy $PACKAGE_NAME ${RELEASE_TAG} [skip ci]"
            git push origin HEAD
          fi

          # デプロイしたコミットにリリースタグを設定してプッシュ (git+httpsでのタグ付きインストールに対応するため)
          git tag -f "${RELEASE_TAG}" HEAD
          git push --force origin "${RELEASE_TAG}"
        if: ${{ steps.release.outputs.release_created }}
